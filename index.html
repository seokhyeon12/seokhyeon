<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>상품 리스트 (클릭 상세보기)</title>
  <style>
    :root{
      --bg:#0b0c0f; --panel:#14161a; --panel-2:#1a1d22; --text:#e8eaed; --muted:#a8b0bb; --accent:#4da3ff;
      --border:#262a31; --radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:system-ui, -apple-system, "Noto Sans KR", Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text)}
    .wrap{max-width:1200px; margin:40px auto; padding:0 20px}
    h1{font-size:24px; margin:0 0 16px}
    .toolbar{display:flex; gap:12px; align-items:center; margin-bottom:16px}
    .search{flex:1; position:relative}
    .search input{width:100%; padding:12px 44px 12px 14px; border-radius:10px; background:var(--panel); border:1px solid var(--border); color:var(--text)}
    .search svg{position:absolute; right:12px; top:50%; transform:translateY(-50%); width:20px; height:20px; opacity:.7}
    .pill{padding:8px 12px; border:1px solid var(--border); background:var(--panel); border-radius:999px; color:var(--muted); cursor:pointer; transition:all 0.2s ease}
    .pill:hover{background:var(--panel-2)}
    .pill.active{background:var(--panel-2); color:var(--text); border-color:#2c313a}

    .table{width:100%; border-collapse:separate; border-spacing:0}
    .table thead th{position:sticky; top:0; background:var(--panel-2); text-align:left; font-weight:600; font-size:13px; letter-spacing:.02em; padding:12px 14px; color:#c9d1d9; border-bottom:1px solid var(--border)}
    .table tbody tr{background:var(--panel); transition:background 0.2s ease}
    .table tbody tr:hover{background:#16191e}
    .table tbody tr:not(:last-child){border-bottom:1px solid var(--border)}
    .table td{padding:14px; vertical-align:top; color:var(--text)}
    .table .name-btn{all:unset; color:var(--accent); cursor:pointer; transition:all 0.2s ease}
    .table .name-btn:hover{text-decoration:underline; color:#6bb8ff}
    .badge{display:inline-block; padding:4px 10px; font-size:12px; border-radius:999px; background:#243042; color:#a8c9ff; border:1px solid #2b3b54; white-space:nowrap}
    .muted{color:var(--muted)}

    .panel{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:0 10px 30px rgba(0,0,0,.25)}

    /* Modal */
    .modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; padding:20px; z-index:1000}
    .modal{width:min(920px, 96vw); max-height:90vh; overflow:auto; animation:modalSlide 0.3s ease}
    .modal header{display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--border)}
    .modal h2{margin:0; font-size:18px}
    .modal .body{display:grid; grid-template-columns: 360px 1fr; gap:18px; padding:18px}
    .modal .body img{width:100%; height:auto; border-radius:10px; border:1px solid var(--border); background:#0f1115}
    .modal .kv{display:grid; grid-template-columns:120px 1fr; gap:10px; margin-top:8px}
    .modal .kv div{padding:8px 0; border-bottom:1px dashed #2a2f37}
    .close{all:unset; cursor:pointer; padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--panel-2); transition:background 0.2s ease}
    .close:hover{background:var(--panel)}

    @keyframes modalSlide{
      from{opacity:0; transform:translateY(-20px) scale(0.95)}
      to{opacity:1; transform:translateY(0) scale(1)}
    }

    /* Responsive */
    @media (max-width: 820px){
      .modal .body{grid-template-columns: 1fr}
    }
    @media (max-width: 720px){
      .table thead{display:none}
      .table, .table tbody, .table tr, .table td{display:block; width:100%}
      .table tr{margin-bottom:10px; border:1px solid var(--border); border-radius:12px; overflow:hidden}
      .table td{display:flex; gap:8px}
      .table td::before{content:attr(data-label); flex:0 0 90px; color:var(--muted); font-weight:500}
    }

    .no-results{text-align:center; padding:40px 20px; color:var(--muted)}
    .no-results svg{width:48px; height:48px; opacity:0.5; margin-bottom:16px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>상품 리스트</h1>
    <div class="toolbar">
      <div class="search">
        <input id="q" type="search" placeholder="상품명/특징/유형으로 검색" aria-label="검색"/>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 2a8 8 0 105.293 14.293l4.207 4.207 1.414-1.414-4.207-4.207A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
      </div>
      <button class="pill active" data-filter="all">전체</button>
      <button class="pill" data-filter="동영상">동영상</button>
      <button class="pill" data-filter="동영상+디스플레이">동영상+디스플레이</button>
      <button class="pill" data-filter="디스플레이">디스플레이</button>
    </div>

    <div class="panel">
      <table class="table" id="tbl" aria-describedby="상품 테이블">
        <thead>
          <tr>
            <th style="width:140px; min-width:140px">유형</th>
            <th>상품명</th>
            <th style="width:140px">단가</th>
            <th>특징 요약</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="no-results" id="noResults" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 2a8 8 0 105.293 14.293l4.207 4.207 1.414-1.414-4.207-4.207A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/>
        </svg>
        <div>검색 결과가 없습니다</div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal panel" role="document">
      <header>
        <h2 id="modalTitle">상세정보</h2>
        <button class="close" id="closeBtn" aria-label="닫기">✕</button>
      </header>
      <div class="body">
        <img id="modalImg" alt="상품 이미지" />
        <section>
          <div class="kv"><div class="muted">유형</div><div id="mType"></div></div>
          <div class="kv"><div class="muted">상품명</div><div id="mName"></div></div>
          <div class="kv"><div class="muted">단가</div><div id="mPrice"></div></div>
          <div class="kv"><div class="muted">특징</div><div id="mDesc"></div></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    // 1) 여기에 데이터만 추가/수정하면 테이블과 모달이 자동으로 반영됩니다.
    // 💡 이미지 사용법:
    // - 로컬 파일: "instream.jpg" (HTML과 같은 폴더)
    // - 폴더 구조: "images/instream.jpg"
    // - 온라인 URL: "https://example.com/image.jpg"
    // - 현재는 Unsplash에서 무료 이미지 사용중
    
    const products = [
      {
        id:"p1",
        type:"동영상",
        name:"인스트림",
        price:"CPM 2,500원",
        summary:"Live/VOD 진입 시 노출되는 Non‑Skip 동영상(15초 이후 Skip 버튼)",
        desc:`Live/VOD 방송 진입 시 노출되는 Non‑Skip 동영상 광고로, 15초 이후 Skip 버튼이 생성됩니다. 
주목도와 재생률이 높아 브랜딩 효율이 우수한 대표 동영상 상품입니다.`,
        // 👇 여기를 "instream.jpg" 같은 로컬 파일명으로 변경하세요
        image:"https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=720&h=480&fit=crop&crop=center"
      },
      {
        id:"p2",
        type:"동영상+디스플레이",
        name:"모바일 인스트림 풀배너",
        price:"CPM 2,500원",
        summary:"상단 영상+하단 풀배너 동시 노출(풀배너 확장/축소)",
        desc:`Live/VOD 진입 시 상단에 영상 광고, 하단에는 풀배너가 함께 노출됩니다. 
풀배너는 확장/축소가 가능하며, 높은 재생률과 클릭률이 강점인 SOOP 대표 결합형 상품입니다.`,
        image:"https://images.unsplash.com/photo-1560472354-b33ff0c44a43?w=720&h=480&fit=crop&crop=center"
      },
      {
        id:"p3",
        type:"디스플레이",
        name:"모바일 플레이어 배너",
        price:"CPM 500원",
        summary:"방송 진입 시 하단 확장/축소 이미지 배너",
        desc:`방송 진입 시 노출되는 하단 이미지 배너로, 확장/축소가 가능하여 가시성과 CTR이 높은 디스플레이 상품입니다.`,
        image:"https://images.unsplash.com/photo-1551650975-87deedd944c3?w=720&h=480&fit=crop&crop=center"
      },
      {
        id:"p4",
        type:"디스플레이",
        name:"커넥트 배너",
        price:"CPM 500원",
        summary:"스트리머/카테고리 연계 특정 스트리머 방송 연동 노출",
        desc:`스트리머/카테고리와 연계하여 특정 스트리머 방송에 노출할 수 있는 타깃형 디스플레이 배너입니다.`,
        image:"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=720&h=480&fit=crop&crop=center"
      },
      {
        id:"p5",
        type:"디스플레이",
        name:"모바일 인트로 배너",
        price:"1일 1,000만원",
        summary:"SOOP 모바일 앱 진입 첫 화면 노출(브랜딩 주력)",
        desc:`모바일 앱 사용 유저 전체에 노출되는 인트로형 브랜딩 주력 상품으로, 최상단 풀스크린 영역에서 강한 주목도를 제공합니다.`,
        image:"https://images.unsplash.com/photo-1512486130939-2c4f79935e4f?w=720&h=480&fit=crop&crop=center"
      },
      {
        id:"p6",
        type:"디스플레이",
        name:"모바일 메인보드",
        price:"CPM 500원",
        summary:"앱 메인 피드 최상단/중단 노출(일상형 상품)",
        desc:`SOOP 앱 메인 피드의 최상단/중단에 노출되는 일상형 디스플레이 상품입니다. 소재 자동서재 기능을 통해 손쉬운 소재 세팅이 가능합니다.`,
        image:"https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=720&h=480&fit=crop&crop=center"
      },
      {
        id:"p7",
        type:"동영상",
        name:"아웃스트림",
        price:"CPM 1,800원",
        summary:"피드 내 자동 재생 동영상 광고(사운드 ON/OFF 가능)",
        desc:`메인 피드나 카테고리 페이지에서 자동으로 재생되는 동영상 광고입니다. 사용자가 스크롤하면서 자연스럽게 시청할 수 있어 거부감이 적습니다.`,
        image:"https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=720&h=480&fit=crop&crop=center"
      },
      {
        id:"p8",
        type:"디스플레이",
        name:"채팅창 배너",
        price:"CPM 800원",
        summary:"실시간 채팅창 우측 고정 배너(실시간 상호작용)",
        desc:`실시간 방송 시청 중 채팅창 우측에 고정 노출되는 배너입니다. 시청자들의 실시간 반응과 함께 노출되어 높은 참여도를 기대할 수 있습니다.`,
        image:"https://images.unsplash.com/photo-1557804506-669a67965ba0?w=720&h=480&fit=crop&crop=center"
      }
    ];

    // 2) 렌더링
    const tbody = document.querySelector('#tbl tbody');
    const q = document.getElementById('q');
    const pills = [...document.querySelectorAll('.pill')];
    const noResults = document.getElementById('noResults');
    let currentFilter = 'all';

    function render(){
      const term = q.value.trim().toLowerCase();
      tbody.innerHTML = '';
      
      const filteredProducts = products
        .filter(p => currentFilter==='all' || p.type===currentFilter)
        .filter(p => !term || (p.name+" "+p.type+" "+p.price+" "+p.summary+" "+p.desc).toLowerCase().includes(term));

      if (filteredProducts.length === 0) {
        noResults.style.display = 'block';
      } else {
        noResults.style.display = 'none';
        filteredProducts.forEach(p => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td data-label="유형"><span class="badge">${p.type}</span></td>
            <td data-label="상품명"><button class="name-btn" data-id="${p.id}" aria-haspopup="dialog">${p.name}</button></td>
            <td data-label="단가" class="muted">${p.price}</td>
            <td data-label="특징 요약">${p.summary}</td>
          `;
          tbody.appendChild(tr);
        });
      }
      
      bindNameButtons();
    }

    // 3) 모달 로직
    const backdrop = document.getElementById('backdrop');
    const closeBtn = document.getElementById('closeBtn');
    const modalTitle = document.getElementById('modalTitle');
    const modalImg = document.getElementById('modalImg');
    const mType = document.getElementById('mType');
    const mName = document.getElementById('mName');
    const mPrice = document.getElementById('mPrice');
    const mDesc = document.getElementById('mDesc');

    function bindNameButtons(){
      document.querySelectorAll('.name-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const p = products.find(x=>x.id===btn.dataset.id);
          if(!p) return;
          modalTitle.textContent = p.name + ' · 상세정보';
          modalImg.src = p.image;
          modalImg.alt = p.name + ' 이미지';
          mType.innerHTML = `<span class="badge">${p.type}</span>`;
          mName.textContent = p.name;
          mPrice.textContent = p.price;
          mDesc.textContent = p.desc;
          openModal();
        });
      });
    }

    function openModal(){
      backdrop.style.display='flex';
      backdrop.setAttribute('aria-hidden','false');
      document.body.style.overflow='hidden';
      closeBtn.focus();
    }
    function closeModal(){
      backdrop.style.display='none';
      backdrop.setAttribute('aria-hidden','true');
      document.body.style.overflow='';
    }

    backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) closeModal(); });
    closeBtn.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModal(); });

    // 4) 검색/필터
    q.addEventListener('input', render);
    pills.forEach(p=>p.addEventListener('click', ()=>{
      pills.forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      currentFilter = p.dataset.filter;
      render();
    }));

    // 초기 렌더
    render();
  </script>
</body>
</html>
